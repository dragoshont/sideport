name: pages-storybook

on:
  push:
    branches: [main]
    paths:
      - "src/Sideport.Admin/**"
      - ".github/workflows/pages-storybook.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-storybook
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/Sideport.Admin
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: src/Sideport.Admin/package-lock.json
      - run: npm ci
      - run: npm run build-storybook
      - run: touch storybook-static/.nojekyll
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: src/Sideport.Admin/storybook-static
          force_orphan: true