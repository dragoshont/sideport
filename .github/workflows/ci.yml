name: ci

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
  workflow_dispatch:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - run: dotnet restore
      - run: dotnet build --no-restore -c Release
      - run: dotnet test --no-build -c Release

  build-image:
    # Publish the runnable image after the suite is green. Skipped on PRs (no
    # push); runs on push to main + manual dispatch.
    needs: build-test
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/dragoshont/sideport
          # Tagging scheme:
          #   release (git tag vX.Y.Z) -> X.Y.Z, X.Y, latest   <- the tags to pin
          #   push to main             -> edge + sha-<short>    (bleeding edge / per-commit)
          # `latest` tracks the newest non-prerelease release (metadata-action
          # flavor default latest=auto), NOT every main push.
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=edge,branch=main
            type=sha,format=short
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          # zsign is a static amd64 ELF (baked from altserver-linux), so the
          # image is amd64 — the homelab node's arch.
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
