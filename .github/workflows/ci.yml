name: ci

on:
  push:
    branches: [main, "feature/**"]
    tags: ["v*.*.*"]
  pull_request:
  workflow_dispatch:

jobs:
  admin-ui:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/Sideport.Admin
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: src/Sideport.Admin/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm run build-storybook
      - run: npx playwright install --with-deps chromium
      - run: npm run test:screens -- --project=desktop --project=mobile

  build-test:
    # The managed core is cross-platform — prove it on Linux AND macOS (incl.
    # Apple Silicon). Windows is intentionally excluded: the password-less p12
    # re-export hardening uses File.SetUnixFileMode (Unix-only), and the signer
    # (zsign) is a Linux ELF, so Windows is not a runtime target.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - run: dotnet restore
      - run: dotnet build --no-restore -c Release
      - run: dotnet test --no-build -c Release

  build-image:
    # Publish the runnable image after the suite is green. Skipped on PRs (no
    # push); runs on push to main + manual dispatch.
    needs: [build-test, admin-ui]
    if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/dragoshont/sideport
          # Tagging scheme:
          #   release (git tag vX.Y.Z) -> X.Y.Z, X.Y, latest   <- the tags to pin
          #   push to main             -> edge + sha-<short>    (bleeding edge / per-commit)
          # `latest` tracks the newest non-prerelease release (metadata-action
          # flavor default latest=auto), NOT every main push.
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=edge,branch=main
            type=sha,format=short
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          # zsign is a static amd64 ELF (baked from altserver-linux), so the
          # image is amd64 — the homelab node's arch.
          platforms: linux/amd64
          # Single-platform image: skip the provenance/SBOM attestation
          # manifests so the GHCR package lists just `linux/amd64` instead of an
          # extra `unknown/unknown` entry.
          provenance: false
          sbom: false
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
