# Fresh Sideport installation for an x86-64 Docker host.
#
# 1. Copy deploy/sideport.env.example to deploy/sideport.env and replace the
#    non-secret placeholders. Never commit the resulting env file.
# 2. Install/start usbmuxd on the host and trust the iPhone once over USB.
# 3. Run: docker compose --env-file deploy/sideport.env -f deploy/compose.yaml up -d
#
# Sideport owns one persistent state volume. Anisette owns a separate persistent
# Apple machine-identity volume. Back up both before upgrades.

name: sideport

services:
  sideport:
    image: ${SIDEPORT_IMAGE:-ghcr.io/dragoshont/sideport:0.1.12}
    platform: linux/amd64
    depends_on:
      anisette:
        condition: service_started
    environment:
      Sideport__Anisette__Url: "http://anisette:6969/"
      Sideport__Api__AuthToken: "${SIDEPORT_API_TOKEN:?set SIDEPORT_API_TOKEN in deploy/sideport.env}"
      Sideport__Identity__Mode: "${SIDEPORT_IDENTITY_MODE:-passkey}"
      Sideport__Oidc__Authority: "${SIDEPORT_OIDC_AUTHORITY:-}"
      Sideport__Oidc__ClientId: "${SIDEPORT_OIDC_CLIENT_ID:-}"
      Sideport__Oidc__ClientSecret: "${SIDEPORT_OIDC_CLIENT_SECRET:-}"
      Sideport__Identity__ProviderLabel: "${SIDEPORT_IDENTITY_PROVIDER_LABEL:-Your account}"
      Sideport__Identity__LoginLabel: "${SIDEPORT_IDENTITY_LOGIN_LABEL:-Continue to sign in}"
      Sideport__Apple__DeviceId: "${SIDEPORT_DEVICE_ID:?set SIDEPORT_DEVICE_ID in deploy/sideport.env}"
      Sideport__Apple__CredentialSource: "managed"
      Sideport__Apple__AllowInsecureCredentialEntryOnLoopback: "true"
      Sideport__PublicOrigin: "${SIDEPORT_PUBLIC_ORIGIN:-http://127.0.0.1:8080/}"
      Sideport__Scheduler__Enabled: "true"
      Sideport__State__Directory: "/var/lib/sideport"
      Sideport__Orchestrator__WorkDirectory: "/var/lib/sideport/signed"
      Sideport__Orchestrator__InstallTimeout: "${SIDEPORT_INSTALL_TIMEOUT:-00:03:00}"
      Sideport__Orchestrator__InstallCancellationGrace: "${SIDEPORT_INSTALL_CANCELLATION_GRACE:-00:00:02}"
      Sideport__Devices__PairingRecordsDir: "/var/lib/lockdown"
      USBMUXD_SOCKET_ADDRESS: "unix:/var/run/usbmuxd"
    ports:
      - "${SIDEPORT_PORT:-8080}:8080"
    volumes:
      - sideport-state:/var/lib/sideport
      - /var/run/usbmuxd:/var/run/usbmuxd
      - /var/lib/lockdown:/var/lib/lockdown:ro
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:uid=1000,gid=1000,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  anisette:
    image: ${ANISETTE_IMAGE:-dadoum/anisette-v3-server:latest}
    volumes:
      - anisette-data:/home/Alcoholic/.config/anisette-v3
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

volumes:
  sideport-state:
  anisette-data:
