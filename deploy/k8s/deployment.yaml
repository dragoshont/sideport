apiVersion: apps/v1
kind: Deployment
metadata:
  name: sideport
  labels:
    app: sideport
spec:
  # One replica, Recreate — never two Sideport pods at once. Two signers for one
  # free-tier Apple ID certificate revoke each other (see the repo README).
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: sideport
  template:
    metadata:
      labels:
        app: sideport
    spec:
      # The device-install leg talks to the iPhone through the NODE's usbmuxd
      # socket, so the pod must land on the node where the phone is paired (USB,
      # or netmuxd for Wi-Fi). On a multi-node cluster, pin it:
      #   nodeSelector: { kubernetes.io/hostname: <your-node> }
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      volumes:
        # Durable Sideport state: registrations, protected credential storage,
        # scheduler/operation evidence, and stored IPAs.
        - name: sideport-state
          persistentVolumeClaim:
            claimName: sideport-state
        # Host usbmuxd socket — the device-install path. usbmuxd (and netmuxd
        # for Wi-Fi) run on the NODE, not in the pod, so the pod stays
        # non-privileged and only gets this one socket. Drop this volume + its
        # mount + USBMUXD_SOCKET_ADDRESS below if you install over the network.
        - name: usbmuxd
          hostPath:
            path: /var/run/usbmuxd
            type: Socket
        # Optional read-only pairing records for hosts that own Wi-Fi pairing
        # material. Leave commented unless this node's /var/lib/lockdown is the
        # trust source for the iPhone; never mount it read-write.
        # - name: lockdown
        #   hostPath:
        #     path: /var/lib/lockdown
        #     type: Directory
        # Durable anisette ADI (Apple machine identity). Seed this PVC from an
        # already-trusted ADI only when intentionally migrating an identity.
        - name: anisette-data
          persistentVolumeClaim:
            claimName: sideport-anisette
        - name: tmp
          emptyDir: {}
      containers:
        - name: sideport
          # Pin a release tag (see the README "How it's distributed" table);
          # :latest also works to start. The signer (zsign) is baked in.
          image: ghcr.io/dragoshont/sideport:0.1.0
          imagePullPolicy: IfNotPresent
          env:
            # ── SINGLE-SIGNER GUARD ──────────────────────────────────────────
            # Confirm no AltStore/AltServer or second Sideport uses the same
            # Apple ID before completing setup; onboarding explains this guard.
            - name: Sideport__Scheduler__Enabled
              # Bootstrap request only. Durable scheduling stays off until
              # onboarding proves a verified app, signer, and paired phone.
              value: "true"
            - name: Sideport__State__Directory
              value: "/var/lib/sideport"
            - name: Sideport__Orchestrator__InstallTimeout
              value: "00:03:00"
            - name: Sideport__Orchestrator__InstallCancellationGrace
              value: "00:00:02"
            # Authentik owns browser identity and passkeys. Replace these
            # example values in a reviewed environment overlay.
            - name: Sideport__PublicOrigin
              value: "https://sideport.example.com/"
            - name: Sideport__Oidc__Enabled
              value: "true"
            - name: Sideport__Oidc__Authority
              value: "https://auth.example.com/application/o/sideport/"
            - name: Sideport__Oidc__ClientId
              value: "sideport"
            - name: Sideport__Identity__ProviderId
              value: "authentik"
            - name: Sideport__Identity__ProviderLabel
              value: "Sideport account"
            - name: Sideport__Identity__PreferredMethod
              value: "passkey"
            - name: Sideport__Identity__EnrollmentLabel
              value: "Create passkey"
            - name: Sideport__Identity__LoginLabel
              value: "Continue with Microsoft"
            - name: Sideport__Oidc__ClientSecret
              valueFrom:
                secretKeyRef:
                  name: sideport-secrets
                  key: SIDEPORT_OIDC_CLIENT_SECRET
            # Trust only the actual Traefik address or narrow cluster network.
            - name: Sideport__ReverseProxy__KnownNetworks__0
              value: "10.42.0.0/16"
            # Optional new-account passkey enrollment adapter. Remove these
            # values to allow existing Authentik accounts only.
            - name: Sideport__Authentik__BaseUrl
              value: "https://auth.example.com/"
            - name: Sideport__Authentik__EnrollmentFlowSlug
              value: "sideport-enrollment"
            - name: Sideport__Authentik__EnrollmentFlowId
              value: "00000000-0000-0000-0000-000000000001"
            - name: Sideport__Authentik__RecoveryUrl
              value: "https://auth.example.com/if/flow/default-recovery-flow/"
            - name: Sideport__Authentik__ApiToken
              valueFrom:
                secretKeyRef:
                  name: sideport-secrets
                  key: SIDEPORT_AUTHENTIK_API_TOKEN
            # Accept Apple credentials in the authenticated HTTPS UI and keep
            # only their protected envelope on the Sideport state volume.
            - name: Sideport__Apple__CredentialSource
              value: "managed"
            # anisette sidecar (same pod, localhost).
            - name: Sideport__Anisette__Url
              value: "http://127.0.0.1:6969"
            # Optional bearer token guarding /api/* (the refresh trigger). The
            # /healthz + /readyz probes stay open. Make the secret key optional
            # so the API can run open behind reverse-proxy auth if you omit it.
            - name: Sideport__Api__AuthToken
              valueFrom:
                secretKeyRef:
                  name: sideport-secrets
                  key: SIDEPORT_API_TOKEN
                  optional: true
            - name: Sideport__Apple__DeviceId
              valueFrom:
                secretKeyRef:
                  name: sideport-secrets
                  key: SIDEPORT_DEVICE_ID
            # Matches the host usbmuxd socket mounted above.
            - name: USBMUXD_SOCKET_ADDRESS
              value: "unix:/var/run/usbmuxd"
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 3
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
          volumeMounts:
            - name: sideport-state
              mountPath: /var/lib/sideport
            - name: usbmuxd
              mountPath: /var/run/usbmuxd
            # Optional Wi-Fi pairing trust material; uncomment with the matching
            # hostPath volume only when the deployment host owns those records.
            # - name: lockdown
            #   mountPath: /var/lib/lockdown
            #   readOnly: true
            - name: tmp
              mountPath: /tmp
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
        # anisette v3 (Apple ADI provider) — the one closed-source sidecar.
        # Multi-arch (amd64 + arm64). Pin a digest in production.
        - name: anisette
          image: dadoum/anisette-v3-server:latest
          ports:
            - name: anisette
              containerPort: 6969
              protocol: TCP
          volumeMounts:
            - name: anisette-data
              mountPath: /home/Alcoholic/.config/anisette-v3
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
---
apiVersion: v1
kind: Service
metadata:
  name: sideport
  labels:
    app: sideport
spec:
  type: ClusterIP
  selector:
    app: sideport
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: sideport-state
  labels:
    app: sideport
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: sideport-anisette
  labels:
    app: sideport
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 512Mi
