# TEMPLATE ONLY — do NOT commit real values.
#
# Copy to secret.yaml, fill in, then:
#   kubectl apply -n sideport -f secret.yaml
# Better: use sealed-secrets, SOPS, or an external secret manager so plaintext
# never lands in git. The Deployment references this Secret as `sideport-secrets`.
apiVersion: v1
kind: Secret
metadata:
  name: sideport-secrets
type: Opaque
stringData:
  # Your iPhone's UDID (Settings > General > About, or `idevice_id -l`).
  SIDEPORT_DEVICE_ID: "00000000-0000000000000000"

  # The free Apple ID Sideport signs with.
  APPLE_ID: "you@example.com"

  # That Apple ID's password. NOTE: app-specific passwords do NOT work for the
  # developer login — use the real account password. It never leaves the pod.
  # If you change APPLE_ID, also rename the SIDEPORT_APPLE_PW_* env var in
  # deployment.yaml to match (see the comment there).
  SIDEPORT_APPLE_PW: "CHANGE_ME"

  # Optional: bearer token that guards /api/*. Remove this key (and the env var
  # in deployment.yaml is already optional) to run the API open behind
  # reverse-proxy auth. Use a long random string.
  SIDEPORT_API_TOKEN: "CHANGE_ME_TO_A_LONG_RANDOM_STRING"
