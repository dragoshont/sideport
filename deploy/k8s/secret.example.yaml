# TEMPLATE ONLY — do NOT commit real values.
#
# Schema/example only. Do not copy this into a plaintext applied Secret. Map the
# same keys from the environment's existing sealed/SOPS/external secret at the
# human-reviewed GitOps boundary.
apiVersion: v1
kind: Secret
metadata:
  name: sideport-secrets
type: Opaque
stringData:
  # Stable UUID for this Sideport instance's Apple client identity. This is not
  # an iPhone UDID. Generate it once and keep it with the anisette PVC.
  SIDEPORT_DEVICE_ID: "00000000-0000-0000-0000-000000000000"

  # Apple ID and password are entered later in Sideport's authenticated HTTPS
  # onboarding UI and stored as a protected envelope on sideport-state.

  # Bearer token that protects mutations and first-run credential entry. Use a
  # long random string; OIDC is the alternative for browser authentication.
  SIDEPORT_API_TOKEN: "CHANGE_ME_TO_A_LONG_RANDOM_STRING"

  # Authentik OIDC provider client secret. The provider redirect URI must be
  # exactly https://sideport.example.com/signin-oidc.
  SIDEPORT_OIDC_CLIENT_SECRET: "CHANGE_ME_IN_YOUR_SECRET_STORE"

  # Optional least-privilege Authentik API token used only to create single-use
  # invitations for the Sideport enrollment flow. Omit it to support only
  # existing Authentik accounts.
  SIDEPORT_AUTHENTIK_API_TOKEN: "CHANGE_ME_OR_REMOVE_THE_OPTIONAL_ADAPTER"
