apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: sideport
resources:
  - namespace.yaml
  - deployment.yaml
  - ingress.yaml
  # The Secret is intentionally NOT listed here. A human-owned environment
  # overlay references its existing external/sealed/SOPS secret at the reviewed
  # GitOps apply boundary. This repository never materializes a plaintext Secret.
